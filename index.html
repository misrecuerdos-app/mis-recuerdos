<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoFlow Upload PoC</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:600px;
    margin:40px auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    border:1px solid #ddd;
    padding:20px;
    border-radius:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
    margin-top:15px;
}

#preview{
    max-width:100%;
    margin-top:15px;
    display:none;
}

#result{
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>📸 PhotoFlow PoC</h1>

<div class="card">

<input
    type="file"
    id="fileInput"
    accept="image/*">

<br>

<img id="preview">

<br>

<button onclick="uploadImage()">
Subir Imagen
</button>

<div id="result"></div>
<div id="fileInfo"></div>

<progress
    id="progressBar"
    value="0"
    max="100"
    style="width:100%;display:none;margin-top:15px;">
</progress>
</div>

<script>

const WEBAPP_URL =
'https://script.google.com/macros/s/AKfycbyK_Ki7Vmqmr-7Dzi0ui-8KbmKn5_yQz8zYq_A10qR4fNpHh8Gl-AvF5Cq8m7cMvMCc4Q/exec';

const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const result = document.getElementById('result');
const fileInfo = document.getElementById('fileInfo');
const progressBar = document.getElementById('progressBar');

let selectedFile = null;

fileInput.addEventListener('change', () => {

    selectedFile = fileInput.files[0];

    if(!selectedFile) return;

    preview.src = URL.createObjectURL(selectedFile);
    preview.style.display = 'block';

    fileInfo.innerHTML = `
        <p>
        <strong>Archivo:</strong> ${selectedFile.name}<br>
        <strong>Tamaño:</strong>
        ${(selectedFile.size / 1024 / 1024).toFixed(2)} MB
        </p>
    `;

});

async function uploadImage(){

    if(!selectedFile){

        alert('Selecciona una imagen');
        return;
    }

    const button =
    document.querySelector('button');

    button.disabled = true;

    result.innerHTML =
    '⏳ Preparando imagen...';

    progressBar.style.display = 'block';
    progressBar.value = 10;

    const reader = new FileReader();

    reader.onload = async function(){

        try{

            progressBar.value = 40;

            const base64 =
            reader.result.split(',')[1];

            const payload = {

                fileName:selectedFile.name,
                mimeType:selectedFile.type,
                base64:base64

            };

            result.innerHTML =
            '📤 Subiendo a PhotoFlow...';

            progressBar.value = 60;

            const response =
            await fetch(
                WEBAPP_URL,
                {
                    method:'POST',
                    body:JSON.stringify(payload)
                }
            );

            progressBar.value = 90;

            const data =
            await response.json();

            if(data.success){

                progressBar.value = 100;

                result.innerHTML = `
                    <div style="color:green">
                        ✅ Imagen subida correctamente
                        <br><br>
                        <strong>Archivo:</strong>
                        ${data.fileName}
                    </div>
                `;

                setTimeout(() => {

                    fileInput.value = '';

                    selectedFile = null;

                    preview.style.display = 'none';

                    fileInfo.innerHTML = '';

                    progressBar.style.display = 'none';

                    progressBar.value = 0;

                }, 3000);

            }else{

                result.innerHTML = `
                    <div style="color:red">
                    ❌ ${data.error}
                    </div>
                `;
            }

        }catch(error){

            result.innerHTML = `
                <div style="color:red">
                ❌ ${error}
                </div>
            `;
        }

        button.disabled = false;

    };

    reader.readAsDataURL(selectedFile);

}

</script>

</body>
</html>
